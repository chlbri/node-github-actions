name: pnpm-cache
description: "Cache and retrieve cache"

inputs:
  tag:
    description: "Tag string"
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - name: GitHub Tag
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        tag_prefix: "v"
        custom_tag: ${{ inputs.tag }}
