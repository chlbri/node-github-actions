name: setup-pnpm
description: "Setup Node.js and pnpm"

inputs:
  node-version:
    description: "Version of Node.js to use"
    required: false
    default: "24"
  scope:
    description: "npm scope"
    required: false
    default: "@bemedev"

runs:
  using: "composite"
  steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: "Install node"
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: "https://registry.npmjs.org"
        scope: ${{ inputs.scope }}

    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        run_install: false
