name: Admin Update

on:
  # Manual trigger
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        description: "GitHub token for authentication"
        required: false
        
    inputs:
      NPM_TOKEN:
        description: "NPM token with publish permissions"
        type: string
        required: false

jobs:
  ci-admin:
    name: Execute CI Admin Scripts
    runs-on: ubuntu-latest
    # Execute only on main/master for scheduled runs and if NPM_TOKEN is defined
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master'

    outputs:
      changes-detected: ${{ steps.check-changes.outputs.changes }}

    steps:
      - name: Checkout pnpm repo
        uses: chlbri/node-github-actions/.github/actions/pnpmi@main

      - name: Execute CI Admin
        run: pnpm run ci:admin

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Changed
        if: steps.check-changes.outputs.changes == 'true'
        run: echo "Changes detected in the workspace. Proceeding with version bump and publish."

      - name: Not Changed
        if: steps.check-changes.outputs.changes == 'false'
        run: echo "No changes detected in the workspace. Skipping version bump and publish."

      - name: Upload workspace
        if: steps.check-changes.outputs.changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: updated-workspace
          path: |
            .
            !node_modules
            !.git
          retention-days: 1

  bump-version:
    name: Bump Package Version
    runs-on: ubuntu-latest
    needs: [ci-admin]
    if: needs.ci-admin.outputs.changes-detected == 'true'
    outputs:
      newTag: ${{ steps.bump-version.outputs.newTag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download workspace
        uses: actions/download-artifact@v8
        with:
          name: updated-workspace
          path: .

      - name: Automated Version Bump
        uses: phips28/gh-action-bump-version@v11.0.7
        id: bump-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version-type: "patch"
          skip-commit: "true"
          skip-tag: "true"
          skip-push: "true"

      - name: Upload updated workspace with version
        uses: actions/upload-artifact@v7
        with:
          name: updated-workspace-with-version
          path: |
            .
            !node_modules
            !.git
          retention-days: 1

  commit-changes:
    name: Commit Changes
    runs-on: ubuntu-latest
    needs: [ci-admin, bump-version]
    if: needs.ci-admin.outputs.changes-detected == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download workspace with version
        uses: actions/download-artifact@v8
        with:
          name: updated-workspace-with-version
          path: .

      - name: Commit changes with version bump
        uses: EndBug/add-and-commit@v9
        with:
          message: |
            chore(admin): Execute monthly admin maintenance scripts and bump version

            Automatically executes monthly administrative maintenance scripts and updates the package version. This maintenance includes configuration updates, file cleanup, and performance optimization.

            chlbri: bri_lvi@icloud.com
          author_name: "@chlbri"
          author_email: bri_lvi@icloud.com
          commit: --signoff
          add: "."
          tag: "v${{ needs.bump-version.outputs.newTag }}"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workspace
        uses: actions/upload-artifact@v7
        with:
          name: ready-workspace
          path: |
            .
            !node_modules
            !.git
          retention-days: 1

  publish:
    name: Publish to NPM

    runs-on: ubuntu-latest
    needs: [commit-changes, ci-admin]
    if: needs.ci-admin.outputs.changes-detected == 'true'

    steps:
      - name: Checkout pnpm repo
        uses: chlbri/node-github-actions/.github/actions/setup-pnpm@main

      - name: Download workspace with version
        uses: actions/download-artifact@v8
        with:
          name: ready-workspace
          path: .

      - name: Install dependencies
        shell: bash
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build

      - uses: JS-DevTools/npm-publish@v4
        id: publish
        name: Publish
        with:
          token: ${{ secrets.NPM_TOKEN }}
          access: public
          strategy: upgrade

      - name: Check - updated
        if: ${{ steps.publish.outputs.type }}
        run: echo "${{ steps.publish.outputs.name }} Version changed from
          ${{ steps.publish.outputs.old-version }} to ${{
          steps.publish.outputs.version }}"

      - name: Check - not updated
        if: ${{ ! steps.publish.outputs.type }}
        run: echo "Remain the same! - ${{ steps.publish.outputs.version }}"

      - name: GitHub Tag
        if: ${{ steps.publish.outputs.type }}
        uses: chlbri/node-github-actions/.github/actions/tag@main
        with:
          tag: ${{ steps.publish.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: Cleanup Artifacts
    runs-on: ubuntu-latest
    needs: [ci-admin, bump-version, commit-changes, publish]
    if: needs.ci-admin.outputs.changes-detected == 'true'
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete artifacts
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });

              for (const artifact of artifacts.data.artifacts) {
                if (artifact.name === 'updated-workspace' || artifact.name === 'updated-workspace-with-version' || artifact.name === 'ready-workspace') {
                  console.log(`Deleting artifact: ${artifact.name} (ID: ${artifact.id})`);
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: artifact.id,
                  });
                  console.log(`Successfully deleted artifact: ${artifact.name}`);
                }
              }
            } catch (error) {
              console.log(`Error during cleanup: ${error.message}`);
              // Do not fail the workflow due to cleanup issues
            }
